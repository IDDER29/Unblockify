<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unblockify · My blockages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./stylesheet.main.css" />
    <link rel="stylesheet" href="./dashboard.css" />
  </head>

  <body class="dashboard-page">
    <div id="app"></div>

    <section class="modal" id="newModal">
      <form class="add_new_blockage" id="newForm">
        <div class="flex-row header">
          <h1>I'm stuck</h1>
          <button type="button" class="close-modal" id="newClose">&times;</button>
        </div>
        <div id="newFields">
          <label for="title">What are you stuck on?</label>
          <input type="text" id="title" name="title" placeholder="e.g. My fetch returns 401 even with a token" required autocomplete="off" />
          <div class="social-proof" id="socialProof" hidden></div>

          <label for="briefSelect">Which part of the course?</label>
          <select id="briefSelect" name="brief">
            <option value="">— none —</option>
          </select>

          <label for="difficulty">How stuck are you?</label>
          <input type="text" id="difficulty" name="difficulty" placeholder="Short summary of the difficulty" />

          <label for="details">What have you tried so far?</label>
          <textarea id="details" name="details" placeholder="What you expected, what happened, and what you've already tried. The more you share, the faster you're unblocked." required></textarea>

          <label for="reportFiles">Attach a screenshot or file (optional)</label>
          <input type="file" id="reportFiles" multiple
            accept="image/png,image/jpeg,image/gif,image/webp,image/svg+xml,text/plain,application/pdf" />

          <label style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--muted,#666);margin-bottom:.5rem;cursor:pointer">
            <input type="checkbox" id="anonToggle" />
            Submit anonymously (instructors see your blockage, not your name)
          </label>
          <input type="submit" value="Get unblocked" />
        </div>
      </form>
    </section>

    <script src="./functions/api.js"></script>
    <script src="./functions/dashbord.js"></script>
  </body>
</html>
