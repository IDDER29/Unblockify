<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unblockify · My blockages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./stylesheet.main.css" />
    <link rel="stylesheet" href="./dashboard.css" />
  </head>

  <body class="dashboard-page">
    <div id="app"></div>

    <section class="modal" id="newModal">
      <form class="add_new_blockage" id="newForm">
        <div class="flex-row header">
          <h1>New blockage</h1>
          <button type="button" class="close-modal" id="newClose">&times;</button>
        </div>
        <div id="newFields">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" placeholder="What are you stuck on?" required />

          <label for="briefSelect">Brief</label>
          <select id="briefSelect" name="brief">
            <option value="">— none —</option>
          </select>

          <label for="difficulty">Difficulty</label>
          <input type="text" id="difficulty" name="difficulty" placeholder="Short summary of the difficulty" />

          <label for="details">Details</label>
          <textarea id="details" name="details" placeholder="What have you tried? What's the error?" required></textarea>

          <label for="reportFiles">Attach files (optional)</label>
          <input type="file" id="reportFiles" multiple
            accept="image/png,image/jpeg,image/gif,image/webp,image/svg+xml,text/plain,application/pdf" />

          <input type="submit" value="Report blockage" />
        </div>
      </form>
    </section>

    <script src="./functions/api.js"></script>
    <script src="./functions/dashbord.js"></script>
  </body>
</html>
