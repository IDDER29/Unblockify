<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unblockify · Log in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./stylesheet.main.css" />
    <style>
      .field { position: relative; }
      .pw-toggle { position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); padding: 0.35rem; display: flex; align-items: center; border-radius: 6px; line-height: 1; }
      .pw-toggle:hover { color: var(--ink); }
      .field input[type="password"], .field input[type="text"] { padding-right: 2.75rem; }
    </style>
  </head>
  <body>
    <svg width="0" height="0" style="position: absolute">
      <symbol id="mark" viewBox="0 0 32 32">
        <rect x="1" y="1" width="30" height="30" rx="9" fill="#12B886" />
        <path d="M6 16h4l2.5-6 4 12 2.5-6h7" fill="none" stroke="#05281d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
    </svg>

    <div class="auth">
      <aside class="auth-aside">
        <a href="index.html" class="brand">
          <svg class="brand-mark"><use href="#mark" /></svg>
          Unblockify
        </a>
        <div class="aside-body">
          <h2>Welcome back. Let's get the room moving.</h2>
          <p>Pick up where you left off — your blockages and your queue are waiting.</p>
          <svg class="signal-wave" viewBox="0 0 320 80" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <linearGradient id="sig" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#FF5A4D" />
                <stop offset="60%" stop-color="#F59F00" />
                <stop offset="85%" stop-color="#12B886" />
              </linearGradient>
            </defs>
            <path class="pulse-track" d="M0 48 L80 48 L96 16 L112 70 L128 48 L168 48 L184 14 L198 72 L214 38 L250 38 L266 8 L280 66 L296 28 L320 28" fill="none" stroke="url(#sig)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div class="aside-meta">UNBLOCKIFY — STUDENT SUPPORT</div>
      </aside>

      <main class="auth-main">
        <div class="auth-card">
          <h1>Log in</h1>
          <p class="sub">New here? <a href="signup.html">Create an account</a></p>

          <form class="login-form">
            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" autocomplete="email" placeholder="you@school.com" required autofocus />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input type="password" id="password" autocomplete="current-password" placeholder="Your password" required />
              <button type="button" class="pw-toggle" data-target="password" aria-label="Show password"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
            <p class="sub" style="margin: -4px 0 4px; text-align: right">
              <a href="forgot.html">Forgot password?</a>
            </p>
            <div class="form-error" id="loginError" role="alert"></div>
            <button type="button" class="btn btn-primary btn-block btn-lg" id="login-form-btn">Log in</button>
          </form>
        </div>
      </main>
    </div>

    <script src="./functions/api.js"></script>
    <script src="./functions/login.js"></script>
    <script>
      const EYE = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      const EYE_OFF = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      document.querySelectorAll(".pw-toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          const i = document.getElementById(btn.dataset.target);
          if (!i) return;
          const show = i.type === "password";
          i.type = show ? "text" : "password";
          btn.innerHTML = show ? EYE_OFF : EYE;
          btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
        });
      });
    </script>
  </body>
</html>
